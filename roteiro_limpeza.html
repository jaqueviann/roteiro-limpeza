<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Roteiro de Limpeza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #f7a26a;
    --accent3: #5dd9a4;
    --text: #f0eff8;
    --text-muted: #8884a8;
    --danger: #f76a6a;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #1a1033 0%, #0f1a2e 100%);
    padding: 48px 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(124,106,247,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-icon {
    font-size: 44px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 18px rgba(124,106,247,0.7));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, #a99fff, #f7a26a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    margin: 20px 16px 0;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 12px rgba(124,106,247,0.4);
  }

  /* ── PANELS ── */
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
  }
  .card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title span { font-size: 16px; }

  /* ── INPUTS ── */
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  input[type="text"], input[type="time"] {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 12px;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15);
  }
  input::placeholder { color: var(--text-muted); opacity: 0.6; }

  /* ── ENDEREÇOS LIST ── */
  .addresses-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

  .address-item {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.25s ease;
    position: relative;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .addr-num {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .addr-info { flex: 1; min-width: 0; }
  .addr-name {
    font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .addr-street {
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .addr-time {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--accent2);
    flex-shrink: 0;
  }
  .addr-remove {
    background: none; border: none; color: var(--danger);
    font-size: 18px; cursor: pointer; padding: 2px 4px;
    flex-shrink: 0; line-height: 1;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .addr-remove:hover { opacity: 1; }

  /* Input de novo endereço */
  .add-addr-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .add-addr-row input { margin-bottom: 0; }
  .add-full { grid-column: 1 / -1; }

  /* ── BOTÕES ── */
  .btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .btn-accent {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(124,106,247,0.35);
  }
  .btn-accent:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,106,247,0.45); }
  .btn-accent:active { transform: translateY(0); }

  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
  }
  .btn-green {
    background: var(--accent3);
    color: #0a2e1f;
  }
  .btn-orange {
    background: var(--accent2);
    color: #2e1a0a;
    box-shadow: 0 4px 16px rgba(247,162,106,0.35);
  }
  .btn-sm {
    padding: 10px 14px;
    font-size: 13px;
    width: auto;
  }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }
  .btn-row .btn { flex: 1; }

  /* ── RESULTADO / ITINERÁRIO ── */
  .itinerary-header {
    background: linear-gradient(135deg, var(--accent) 0%, #4b3fdb 100%);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    text-align: center;
  }
  .itinerary-header h2 {
    font-size: 18px; font-weight: 700;
  }
  .itinerary-header p {
    font-size: 12px; opacity: 0.8; margin-top: 4px;
  }

  .stop-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: slideIn 0.3s ease both;
  }
  .stop-card:nth-child(2) { animation-delay: 0.05s; }
  .stop-card:nth-child(3) { animation-delay: 0.1s; }
  .stop-card:nth-child(4) { animation-delay: 0.15s; }
  .stop-card:nth-child(5) { animation-delay: 0.2s; }

  .stop-num {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .stop-home { background: rgba(93,217,164,0.2); color: var(--accent3); border: 2px solid var(--accent3); }
  .stop-regular { background: rgba(124,106,247,0.2); color: var(--accent); border: 2px solid var(--accent); }
  .stop-last { background: rgba(247,162,106,0.2); color: var(--accent2); border: 2px solid var(--accent2); }

  .stop-body { flex: 1; min-width: 0; }
  .stop-label {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-muted);
    margin-bottom: 3px;
  }
  .stop-name { font-size: 15px; font-weight: 700; }
  .stop-addr { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .stop-est {
    font-family: 'Space Mono', monospace;
    font-size: 11px; color: var(--accent2);
    margin-top: 6px;
  }

  .connector {
    height: 20px;
    display: flex; align-items: center;
    padding-left: 31px;
    gap: 8px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .connector::before {
    content: '';
    width: 2px; height: 100%;
    background: linear-gradient(to bottom, var(--accent), transparent);
    margin-left: 17px; margin-right: 8px;
    flex-shrink: 0;
  }

  /* ── SAVED LISTS ── */
  .saved-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .saved-item:hover { border-color: var(--accent); }
  .saved-day {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
  }
  .saved-count { font-size: 13px; color: var(--text-muted); }
  .saved-addresses { font-size: 12px; margin-top: 6px; color: var(--text); }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--accent3); color: #0a2e1f;
    padding: 12px 22px; border-radius: 100px;
    font-size: 13px; font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(93,217,164,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── DAYS PILLS ── */
  .days-row {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
  }
  .day-pill {
    padding: 7px 14px;
    border-radius: 100px;
    font-size: 12px; font-weight: 700;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .day-pill.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 2px 10px rgba(124,106,247,0.3);
  }

  .section-divider {
    height: 1px; background: var(--border);
    margin: 18px 0;
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">🧹</span>
  <h1>Roteiro de Limpeza</h1>
  <p>Itinerário inteligente para sua equipe</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('planejar')">📍 Planejar</button>
  <button class="tab" onclick="switchTab('salvas')">💾 Listas Salvas</button>
  <button class="tab" onclick="switchTab('resultado')">🗺️ Roteiro</button>
</div>

<!-- ═══ PLANEJAR ═══ -->
<div id="panel-planejar" class="panel active">

  <div class="card">
    <div class="card-title"><span>🏠</span> Ponto de Partida</div>
    <label>Nome (ex: Casa da Ana)</label>
    <input type="text" id="origem-nome" placeholder="Casa da equipe / Base" value="">
    <label>Endereço completo</label>
    <input type="text" id="origem-end" placeholder="123 Main St, Tampa, FL">
    <label>Horário de saída</label>
    <input type="time" id="horario-saida" value="08:00">
  </div>

  <div class="card">
    <div class="card-title"><span>📋</span> Dia da semana</div>
    <div class="days-row">
      <button class="day-pill active" onclick="selectDay(this,'Segunda')">Segunda</button>
      <button class="day-pill" onclick="selectDay(this,'Terça')">Terça</button>
      <button class="day-pill" onclick="selectDay(this,'Quarta')">Quarta</button>
      <button class="day-pill" onclick="selectDay(this,'Quinta')">Quinta</button>
      <button class="day-pill" onclick="selectDay(this,'Sexta')">Sexta</button>
      <button class="day-pill" onclick="selectDay(this,'Sábado')">Sábado</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>📍</span> Casas para Limpar</div>

    <div class="addresses-list" id="addr-list"></div>

    <div class="add-addr-row">
      <input type="text" id="new-nome" placeholder="Nome do cliente" class="add-full">
      <input type="text" id="new-end" placeholder="Endereço (rua, número, cidade)" class="add-full">
      <input type="text" id="new-dur" placeholder="Duração (ex: 2h)">
      <input type="text" id="new-sqft" placeholder="Sqft (opcional)">
    </div>
    <button class="btn btn-outline" onclick="addAddress()">＋ Adicionar Casa</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-accent" onclick="gerarRoteiro()">🗺️ Gerar Roteiro</button>
    <button class="btn btn-green btn-sm" onclick="salvarLista()">💾 Salvar</button>
  </div>
</div>

<!-- ═══ SALVAS ═══ -->
<div id="panel-salvas" class="panel">
  <div id="saved-container"></div>
</div>

<!-- ═══ RESULTADO ═══ -->
<div id="panel-resultado" class="panel">
  <div id="resultado-container">
    <div class="empty-state">
      <div class="icon">🗺️</div>
      <p>Gere um roteiro na aba "Planejar" para ver o itinerário aqui.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let addresses = [];
  let selectedDay = 'Segunda';
  let savedLists = JSON.parse(localStorage.getItem('roteiro_listas') || '[]');

  // ── Dia ───────────────────────────────────────────────────────────────
  function selectDay(el, day) {
    document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    selectedDay = day;
  }

  // ── Endereços ─────────────────────────────────────────────────────────
  function addAddress() {
    const nome = document.getElementById('new-nome').value.trim();
    const end  = document.getElementById('new-end').value.trim();
    const dur  = document.getElementById('new-dur').value.trim() || '2h';
    const sqft = document.getElementById('new-sqft').value.trim();
    if (!nome || !end) { showToast('⚠️ Preencha nome e endereço!'); return; }
    addresses.push({ nome, end, dur, sqft });
    document.getElementById('new-nome').value = '';
    document.getElementById('new-end').value = '';
    document.getElementById('new-dur').value = '';
    document.getElementById('new-sqft').value = '';
    renderAddresses();
    showToast('✅ Casa adicionada!');
  }

  function removeAddress(i) {
    addresses.splice(i, 1);
    renderAddresses();
  }

  function renderAddresses() {
    const list = document.getElementById('addr-list');
    if (addresses.length === 0) { list.innerHTML = ''; return; }
    list.innerHTML = addresses.map((a, i) => `
      <div class="address-item">
        <div class="addr-num">${i+1}</div>
        <div class="addr-info">
          <div class="addr-name">${a.nome}</div>
          <div class="addr-street">${a.end}</div>
        </div>
        <div class="addr-time">${a.dur}${a.sqft ? ' · '+a.sqft+' sqft' : ''}</div>
        <button class="addr-remove" onclick="removeAddress(${i})">×</button>
      </div>
    `).join('');
  }

  // ── Salvar lista ──────────────────────────────────────────────────────
  function salvarLista() {
    if (addresses.length === 0) { showToast('⚠️ Adicione pelo menos uma casa!'); return; }
    const origem = document.getElementById('origem-nome').value || 'Base';
    savedLists.push({
      id: Date.now(),
      day: selectedDay,
      origem,
      origemEnd: document.getElementById('origem-end').value,
      horario: document.getElementById('horario-saida').value,
      addresses: [...addresses]
    });
    localStorage.setItem('roteiro_listas', JSON.stringify(savedLists));
    renderSaved();
    showToast('💾 Lista salva!');
  }

  function renderSaved() {
    const c = document.getElementById('saved-container');
    if (savedLists.length === 0) {
      c.innerHTML = `<div class="empty-state"><div class="icon">💾</div><p>Nenhuma lista salva ainda.</p></div>`;
      return;
    }
    c.innerHTML = savedLists.slice().reverse().map((l, ri) => {
      const i = savedLists.length - 1 - ri;
      return `
      <div class="saved-item" onclick="carregarLista(${i})">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="saved-day">📅 ${l.day}</div>
          <button onclick="event.stopPropagation();deleteLista(${i})" style="background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer">🗑</button>
        </div>
        <div class="saved-count">🏠 ${l.addresses.length} casa${l.addresses.length>1?'s':''} · ⏰ ${l.horario}</div>
        <div class="saved-addresses">${l.addresses.map(a=>a.nome).join(' → ')}</div>
      </div>`;
    }).join('');
  }

  function carregarLista(i) {
    const l = savedLists[i];
    document.getElementById('origem-nome').value = l.origem;
    document.getElementById('origem-end').value = l.origemEnd || '';
    document.getElementById('horario-saida').value = l.horario;
    addresses = [...l.addresses];
    renderAddresses();
    // Select day pill
    document.querySelectorAll('.day-pill').forEach(p => {
      p.classList.toggle('active', p.textContent === l.day);
      if (p.textContent === l.day) selectedDay = l.day;
    });
    switchTab('planejar');
    showToast('📂 Lista carregada!');
  }

  function deleteLista(i) {
    savedLists.splice(i, 1);
    localStorage.setItem('roteiro_listas', JSON.stringify(savedLists));
    renderSaved();
  }

  // ── Gerar Roteiro ─────────────────────────────────────────────────────
  function gerarRoteiro() {
    const origemNome = document.getElementById('origem-nome').value.trim() || 'Ponto de Partida';
    const origemEnd  = document.getElementById('origem-end').value.trim();
    const horario    = document.getElementById('horario-saida').value || '08:00';

    if (!origemEnd) { showToast('⚠️ Informe o endereço de partida!'); return; }
    if (addresses.length === 0) { showToast('⚠️ Adicione pelo menos uma casa!'); return; }

    // Algoritmo: nearest neighbor heuristic simplificado
    // Como não temos coordenadas reais, ordena por semelhança de CEP/bairro (heurística textual)
    // + abre Google Maps com waypoints otimizados
    const optimized = optimizeRoute([...addresses]);

    // Calcular horários estimados
    let [h, m] = horario.split(':').map(Number);
    const stops = [];
    stops.push({ type: 'home', name: origemNome, addr: origemEnd, time: fmt(h, m) });

    for (const a of optimized) {
      m += 15; if (m >= 60) { h++; m -= 60; } // ~15 min deslocamento
      stops.push({ type: 'stop', name: a.nome, addr: a.end, arrTime: fmt(h, m), dur: a.dur, sqft: a.sqft });
      const [dh, dm] = parseDur(a.dur);
      h += dh; m += dm;
      if (m >= 60) { h += Math.floor(m/60); m = m % 60; }
    }
    stops[stops.length - 1].type = 'last';

    renderResultado(stops, origemEnd, optimized, horario);
    switchTab('resultado');
  }

  function optimizeRoute(addrs) {
    // Nearest neighbor por similaridade de texto (ZIP/bairro/cidade)
    // Extrai últimas partes do endereço para comparar proximidade textual
    if (addrs.length <= 2) return addrs;
    const extract = s => s.split(',').slice(-2).join('').toLowerCase().replace(/\s/g,'');
    let remaining = [...addrs];
    let result = [];
    let current = extract(document.getElementById('origem-end').value);
    while (remaining.length) {
      let bestScore = -1, bestIdx = 0;
      remaining.forEach((a, i) => {
        const score = similarity(current, extract(a.end));
        if (score > bestScore) { bestScore = score; bestIdx = i; }
      });
      result.push(remaining[bestIdx]);
      current = extract(remaining[bestIdx].end);
      remaining.splice(bestIdx, 1);
    }
    return result;
  }

  function similarity(a, b) {
    // Jaccard de bigramas
    const bigrams = s => { const r = new Set(); for(let i=0;i<s.length-1;i++) r.add(s.slice(i,i+2)); return r; };
    const ba = bigrams(a), bb = bigrams(b);
    let inter = 0;
    ba.forEach(g => { if(bb.has(g)) inter++; });
    return inter / (ba.size + bb.size - inter + 0.001);
  }

  function parseDur(dur) {
    const match = dur.match(/(\d+(?:\.\d+)?)\s*h/i);
    if (match) { const t = parseFloat(match[1]); return [Math.floor(t), Math.round((t%1)*60)]; }
    return [2, 0];
  }
  function fmt(h, m) { return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }

  function renderResultado(stops, origemEnd, optimized, horario) {
    const c = document.getElementById('resultado-container');

    // Montar URL Google Maps
    const gmBase = 'https://www.google.com/maps/dir/';
    const waypoints = [origemEnd, ...optimized.map(a => a.end)].map(encodeURIComponent).join('/');
    const gmUrl = gmBase + waypoints;

    // Waypoints para Waze
    const wazeOrigin = encodeURIComponent(origemEnd);

    c.innerHTML = `
      <div class="itinerary-header">
        <h2>📅 ${selectedDay} — ${stops.length - 1} casa${stops.length-1>1?'s':''}</h2>
        <p>Saída: ${horario} · Itinerário otimizado</p>
      </div>

      ${stops.map((s, i) => {
        const numClass = s.type === 'home' ? 'stop-home' : s.type === 'last' ? 'stop-last' : 'stop-regular';
        const numIcon  = s.type === 'home' ? '🏠' : s.type === 'last' ? '🏁' : (i);
        const label    = s.type === 'home' ? 'Ponto de partida' : s.type === 'last' ? 'Última parada' : `Parada ${i}`;
        const extra    = s.arrTime ? `<div class="stop-est">Chegada ~${s.arrTime} · ${s.dur}${s.sqft?' · '+s.sqft+' sqft':''}</div>` : '';
        const connector = i < stops.length - 1 ? `<div class="connector">~15 min de deslocamento</div>` : '';
        return `
          <div class="stop-card">
            <div class="stop-num ${numClass}">${numIcon}</div>
            <div class="stop-body">
              <div class="stop-label">${label}</div>
              <div class="stop-name">${s.name}</div>
              <div class="stop-addr">${s.addr}</div>
              ${extra}
            </div>
          </div>
          ${connector}
        `;
      }).join('')}

      <div class="section-divider"></div>

      <div style="margin-bottom:10px">
        <div class="card-title" style="margin-bottom:12px"><span>🗺️</span> Abrir navegação</div>
        <a href="${gmUrl}" target="_blank" style="text-decoration:none">
          <button class="btn btn-accent" style="margin-bottom:10px">
            🗺️ Abrir no Google Maps
          </button>
        </a>
        <a href="https://waze.com/ul?ll=&navigate=yes&q=${wazeOrigin}" target="_blank" style="text-decoration:none">
          <button class="btn btn-outline">
            🚗 Abrir no Waze (primeira parada)
          </button>
        </a>
      </div>

      <div class="section-divider"></div>

      <button class="btn btn-outline" onclick="compartilhar('${encodeURIComponent(JSON.stringify(stops))}')">
        📤 Compartilhar Roteiro
      </button>
    `;
  }

  function compartilhar(stopsEnc) {
    const stops = JSON.parse(decodeURIComponent(stopsEnc));
    const text = `🧹 Roteiro ${selectedDay}\n\n` + stops.map((s,i) =>
      s.type === 'home' ? `🏠 Saída: ${s.name}\n📍 ${s.addr}\n⏰ ${s.time}` :
      `\n${i}ª Casa: ${s.name}\n📍 ${s.addr}\n⏰ ~${s.arrTime} (${s.dur})`
    ).join('\n') + '\n\n📲 Gerado pelo app Roteiro de Limpeza';

    if (navigator.share) {
      navigator.share({ title: 'Roteiro de Limpeza', text });
    } else {
      navigator.clipboard.writeText(text).then(() => showToast('📋 Copiado!'));
    }
  }

  // ── UI Helpers ────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    const idx = ['planejar','salvas','resultado'].indexOf(name);
    document.querySelectorAll('.tab')[idx].classList.add('active');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Init ──────────────────────────────────────────────────────────────
  renderSaved();

  // Enter key on inputs
  ['new-nome','new-end','new-dur','new-sqft'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addAddress();
    });
  });
</script>
</body>
</html>
